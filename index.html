
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jana Coffee Menu | منيو كافيه جنى</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-brown: #3d2b1f;
            --brand-gold: #d4af37;
            --brand-beige: #faf7f2;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--brand-beige);
            color: var(--brand-brown);
            overflow-x: hidden;
        }

        /* حركية الاهتزاز الموجي للمربع الرئيسي */
        @keyframes vibrateIn {
            0% { opacity: 0; transform: translateX(100%) rotate(10deg); }
            30% { transform: translateX(-10%) rotate(-5deg); }
            50% { transform: translateX(5%) rotate(3deg); }
            70% { transform: translateX(-2%) rotate(-2deg); }
            100% { opacity: 1; transform: translateX(0) rotate(0deg); }
        }

        /* حركية الاهتزاز للصورة */
        @keyframes imageVibrate {
            0% { opacity: 0; transform: scale(0) rotate(-45deg); }
            40% { transform: scale(1.2) rotate(15deg); }
            60% { transform: scale(0.9) rotate(-10deg); }
            80% { transform: scale(1.05) rotate(5deg); }
            100% { opacity: 1; transform: scale(1) rotate(0deg); }
        }

        /* حركية الاهتزاز للنص */
        @keyframes textVibrate {
            0% { opacity: 0; transform: translateY(20px); }
            50% { transform: translateY(-10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .item-card {
            animation: vibrateIn 0.8s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
            perspective: 1000px;
        }

        .item-card img {
            animation: imageVibrate 0.8s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
            animation-delay: 0.3s; /* تدخل بعد المربع */
        }

        .item-card .content-area {
            animation: textVibrate 0.6s ease-out both;
            animation-delay: 0.6s; /* تدخل بعد الصورة */
        }

        .category-pill.active {
            background-color: var(--brand-brown);
            color: white;
            box-shadow: 0 4px 15px rgba(61, 43, 31, 0.3);
        }

        .hero-shape {
            border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
            animation: morph 8s ease-in-out infinite;
        }

        @keyframes morph {
            0%, 100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
            50% { border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%; }
        }

        .custom-shadow {
            box-shadow: 0 15px 35px -5px rgba(61, 43, 31, 0.15);
        }

        /* إخفاء السكرول بار */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#faf7f2]">

    <!-- شاشة التحميل -->
    <div id="loader" class="fixed inset-0 z-[100] bg-[#3d2b1f] flex items-center justify-center transition-opacity duration-500">
        <div class="text-white text-4xl font-black animate-pulse">جنى...</div>
    </div>

    <!-- الهيدر -->
    <nav class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md h-16 flex items-center px-6 justify-between border-b border-gold/10">
        <span class="text-2xl font-black text-[#3d2b1f]">جنى</span>
        <div class="w-10 h-10 rounded-full bg-gold/10 flex items-center justify-center">☕</div>
    </nav>

    <!-- الهيرو -->
    <header class="pt-24 pb-12 px-6 text-center">
        <div class="relative w-40 h-40 mx-auto mb-6">
            <div class="absolute inset-0 bg-yellow-600/10 hero-shape scale-110"></div>
            <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&q=80&w=400" 
                 class="relative z-10 w-full h-full object-cover hero-shape border-4 border-white shadow-xl">
        </div>
        <h1 class="text-3xl font-black mb-2">قائمة كافيه جنى</h1>
        <p class="text-gray-500 text-sm">استمتع بتجربة فريدة من القهوة المختصة</p>
    </header>

    <!-- تصنيفات -->
    <div class="sticky top-16 z-40 bg-[#faf7f2]/90 backdrop-blur-sm py-4">
        <div class="flex gap-3 overflow-x-auto px-6 no-scrollbar" id="categories">
            <button onclick="filter('all')" class="category-pill active shrink-0 px-6 py-2 rounded-2xl text-sm font-bold bg-white">الكل</button>
            <button onclick="filter('hot')" class="category-pill shrink-0 px-6 py-2 rounded-2xl text-sm font-bold bg-white">ساخن</button>
            <button onclick="filter('cold')" class="category-pill shrink-0 px-6 py-2 rounded-2xl text-sm font-bold bg-white">بارد</button>
            <button onclick="filter('dessert')" class="category-pill shrink-0 px-6 py-2 rounded-2xl text-sm font-bold bg-white">حلويات</button>
        </div>
    </div>

    <!-- الشبكة الرئيسية -->
    <main class="p-6 grid gap-8" id="menu-container">
        <!-- العناصر سيتم توليدها برمجياً -->
    </main>

    <script>
        const menuItems = [
            { id: 1, cat: 'hot', name: 'كورتادو', price: '35', desc: 'توازن مثالي بين الاسبريسو والحليب المبخر.', img: 'https://images.unsplash.com/photo-1534778101976-62847782c213?auto=format&fit=crop&q=80&w=200' },
            { id: 2, cat: 'cold', name: 'آيس لاتيه', price: '45', desc: 'قهوة باردة ومنعشة مع الحليب الطازج.', img: 'https://images.unsplash.com/photo-1517701604599-bb29b565090c?auto=format&fit=crop&q=80&w=200' },
            { id: 3, cat: 'dessert', name: 'تشيز كيك', price: '55', desc: 'طبقة كريمية غنية مع صوص التوت البري.', img: 'https://images.unsplash.com/photo-1533134242443-d4fd215305ad?auto=format&fit=crop&q=80&w=200' },
            { id: 4, cat: 'hot', name: 'فلات وايت', price: '40', desc: 'لعشاق القهوة القوية مع قوام حليبي ناعم.', img: 'https://images.unsplash.com/photo-1577968897966-3d4325b36b61?auto=format&fit=crop&q=80&w=200' },
            { id: 5, cat: 'cold', name: 'سبانيش بارد', price: '50', desc: 'حليب مكثف محلى مع اسبريسو وثلج.', img: 'https://images.unsplash.com/photo-1461023058943-07fcbe16d735?auto=format&fit=crop&q=80&w=200' }
        ];

        function render(items) {
            const container = document.getElementById('menu-container');
            container.innerHTML = '';
            
            items.forEach((item, index) => {
                const card = document.createElement('div');
                // إضافة تأخير بسيط لكل كارت ليظهروا واحداً تلو الآخر
                card.style.animationDelay = `${index * 0.15}s`;
                card.className = 'item-card bg-white p-4 rounded-[2.5rem] custom-shadow flex items-center gap-5 relative overflow-hidden group';
                
                card.innerHTML = `
                    <div class="relative w-24 h-24 shrink-0 overflow-hidden rounded-3xl">
                        <img src="${item.img}" class="w-full h-full object-cover">
                    </div>
                    <div class="content-area flex-1">
                        <div class="flex justify-between items-center mb-1">
                            <h3 class="font-black text-lg">${item.name}</h3>
                            <span class="text-gold font-black text-sm">${item.price} ج.م</span>
                        </div>
                        <p class="text-gray-400 text-[11px] leading-tight mb-3">${item.desc}</p>
                        <button onclick="order('${item.name}')" class="bg-[#25D366] text-white text-[10px] px-4 py-1.5 rounded-full font-bold shadow-md active:scale-95 transition-transform">
                            اطلب الآن
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function filter(category) {
            // تحديث الأزرار
            document.querySelectorAll('.category-pill').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            // تصفية العناصر
            const filtered = category === 'all' ? menuItems : menuItems.filter(i => i.cat === category);
            
            // إعادة الرندرة لإعادة تفعيل الأنيميشن
            const container = document.getElementById('menu-container');
            container.style.opacity = '0';
            setTimeout(() => {
                render(filtered);
                container.style.opacity = '1';
            }, 50);
        }

        function order(name) {
            const msg = encodeURIComponent(`مرحباً جنى كافيه، أود طلب: ${name}`);
            window.open(`https://wa.me/201000000000?text=${msg}`);
        }

        window.onload = () => {
            render(menuItems);
            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
            }, 1000);
        }
    </script>
</body>
</html>

```
