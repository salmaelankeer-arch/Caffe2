
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jana Coffee Menu | منيو كافيه جنى</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-brown: #4a2c2a;
            --brand-beige: #f5f1e9;
            --brand-gold: #c5a059;
            --brand-green: #88a44c;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--brand-beige);
            color: var(--brand-brown);
            margin: 0;
            overflow-x: hidden;
        }

        .blob {
            position: fixed;
            z-index: -1;
            filter: blur(50px);
            opacity: 0.2;
            border-radius: 50%;
        }

        .blob-1 { width: 300px; height: 300px; background: var(--brand-gold); top: -100px; right: -100px; }
        .blob-2 { width: 400px; height: 400px; background: var(--brand-brown); bottom: -150px; left: -150px; }

        .active .zigzag-entry {
            animation: zigzagIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes zigzagIn {
            0% { opacity: 0; transform: translateY(40px) rotate(-5deg); }
            100% { opacity: 1; transform: translateY(0) rotate(0deg); }
        }

        .item-card {
            background: white;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.03);
            transition: 0.3s;
        }

        .item-card:hover { transform: translateY(-5px); border: 1px solid var(--brand-gold); }

        .btn-main {
            background: var(--brand-brown);
            color: white;
            padding: 15px 45px;
            border-radius: 50px;
            font-weight: 900;
            letter-spacing: 1px;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(74, 44, 42, 0.2);
        }

        .btn-main:hover {
            background: var(--brand-gold);
            transform: scale(1.05);
        }

        .hero-img-container {
            position: relative;
            width: 280px;
            height: 280px;
        }

        .hero-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 70%;
            border: 8px solid white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            animation: morph 8s ease-in-out infinite;
        }

        @keyframes morph {
            0% { border-radius: 40% 60% 70% 30% / 40% 50% 60% 70%; }
            50% { border-radius: 70% 30% 50% 50% / 30% 60% 40% 70%; }
            100% { border-radius: 40% 60% 70% 30% / 40% 50% 60% 70%; }
        }

        .floating-beans {
            position: absolute;
            font-size: 24px;
            opacity: 0.6;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .whatsapp-btn {
            background-color: #25D366;
            color: white;
            padding: 8px 16px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: 0.3s;
        }

        .whatsapp-btn:hover {
            background-color: #128C7E;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <!-- الشاشة الافتتاحية -->
    <section id="welcome" class="min-h-screen flex flex-col items-center justify-center p-6 text-center active">
        <div class="mb-6">
            <h1 class="text-6xl font-black text-[#4a2c2a] mb-0 leading-tight">جنى</h1>
            <p class="text-gold uppercase tracking-[0.6em] text-xs font-bold opacity-70">Jana Coffee</p>
        </div>

        <div class="hero-img-container mb-10">
            <img src="https://images.unsplash.com/photo-1511920170033-f8396924c348?auto=format&fit=crop&q=80&w=500" 
                 alt="" 
                 class="hero-img">
            <div class="floating-beans" style="top: 10%; right: -20px;">☕</div>
            <div class="floating-beans" style="bottom: 20%; left: -30px; animation-delay: 1s;">✨</div>
            <div class="floating-beans" style="top: 40%; left: -40px; animation-delay: 2s;">🍰</div>
        </div>

        <h2 class="text-xl mb-10 font-medium text-gray-600">نقدم لكم أجود أنواع القهوة المختصة<br>والحلويات الفاخرة</h2>
        
        <button onclick="goToPage('categories')" class="btn-main">فتح المنيو</button>
    </section>

    <!-- صفحة الفهرس -->
    <section id="categories" class="hidden min-h-screen p-6 pt-12">
        <h2 class="text-3xl font-black text-center mb-10">استكشف القائمة</h2>
        <div class="grid grid-cols-1 gap-5 max-w-md mx-auto">
            <div onclick="loadItems('frappe')" class="item-card p-6 flex items-center justify-between cursor-pointer group hover:bg-white/50">
                <div class="flex items-center gap-4">
                    <img src="https://images.unsplash.com/photo-1572490122747-3968b75cc699?auto=format&fit=crop&q=80&w=100" class="w-16 h-16 rounded-full object-cover border-2 border-brand-gold">
                    <span class="text-xl font-bold">الفرابيه</span>
                </div>
                <span class="text-brand-gold font-bold">←</span>
            </div>
            
            <div onclick="loadItems('cold')" class="item-card p-6 flex items-center justify-between cursor-pointer group hover:bg-white/50">
                <div class="flex items-center gap-4">
                    <img src="https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd?auto=format&fit=crop&q=80&w=100" class="w-16 h-16 rounded-full object-cover border-2 border-brand-green">
                    <span class="text-xl font-bold">آيس تي</span>
                </div>
                <span class="text-brand-gold font-bold">←</span>
            </div>

            <div onclick="loadItems('dessert')" class="item-card p-6 flex items-center justify-between cursor-pointer group hover:bg-white/50">
                <div class="flex items-center gap-4">
                    <img src="https://images.unsplash.com/photo-1578985545062-69928b1d9587?auto=format&fit=crop&q=80&w=100" class="w-16 h-16 rounded-full object-cover border-2 border-brand-brown">
                    <span class="text-xl font-bold">الحلويات</span>
                </div>
                <span class="text-brand-gold font-bold">←</span>
            </div>
        </div>
    </section>

    <!-- صفحة الأصناف -->
    <section id="items-page" class="hidden min-h-screen p-6 pt-12 pb-24">
        <div class="max-w-xl mx-auto">
            <div class="flex justify-between items-center mb-8">
                <button onclick="goToPage('categories')" class="font-bold opacity-50">← عودة</button>
                <h2 id="current-title" class="text-2xl font-black"></h2>
            </div>
            <div id="items-list" class="space-y-6"></div>
        </div>
    </section>

    <script>
        // رقم الواتساب الخاص بك (يرجى وضعه هنا بدون علامة +)
        const WHATSAPP_NUMBER = "201000000000"; 

        const menu = {
            frappe: { title: "قسم الفرابيه", items: [
                { 
                    name: "كاراميل فرابيه", 
                    price: "55", 
                    desc: "مزيج غني من القهوة الباردة مع نكهة الكاراميل المملح وكريمة الخفق.",
                    img: "https://images.unsplash.com/photo-1572490122747-3968b75cc699?auto=format&fit=crop&q=80&w=300" 
                },
                { 
                    name: "موكا فرابيه", 
                    price: "60", 
                    desc: "عشاق الشوكولاتة والقهوة في كوب واحد بلمسة مثلجة ومنعشة.",
                    img: "https://images.unsplash.com/photo-1596078841242-12f73dc697c6?auto=format&fit=crop&q=80&w=300" 
                }
            ]},
            cold: { title: "بن زهيرة آيس تي", items: [
                { 
                    name: "آيس تي ليمون", 
                    price: "40", 
                    desc: "انتعاش الصيف الحقيقي مع قطع الليمون الطازجة والشاي المستخلص ببرودة.",
                    img: "https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd?auto=format&fit=crop&q=80&w=300" 
                }
            ]},
            dessert: { title: "حلويات جنى", items: [
                { 
                    name: "كيكة الشوكولاتة", 
                    price: "45", 
                    desc: "طبقات هشة من الكيك الغني بصوص الشوكولاتة البلجيكية الفاخرة.",
                    img: "https://images.unsplash.com/photo-1578985545062-69928b1d9587?auto=format&fit=crop&q=80&w=300" 
                }
            ]}
        };

        function goToPage(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            const target = document.getElementById(id);
            target.classList.remove('hidden');
            target.classList.add('active');
            window.scrollTo(0, 0);
        }

        function sendWhatsApp(itemName, itemPrice) {
            const message = `مرحباً كافيه جنى، أود طلب: ${itemName} - السعر: ${itemPrice} ج.م`;
            const encodedMessage = encodeURIComponent(message);
            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodedMessage}`, '_blank');
        }

        function loadItems(key) {
            const data = menu[key];
            document.getElementById('current-title').innerText = data.title;
            const list = document.getElementById('items-list');
            list.innerHTML = '';
            
            data.items.forEach((item, i) => {
                const el = document.createElement('div');
                el.className = 'zigzag-entry item-card p-5 flex flex-col sm:flex-row items-center gap-4';
                el.style.animationDelay = (i * 0.1) + 's';
                el.innerHTML = `
                    <img src="${item.img}" class="w-24 h-24 rounded-2xl object-cover shrink-0">
                    <div class="flex-1 text-center sm:text-right">
                        <h3 class="font-black text-lg mb-1">${item.name}</h3>
                        <p class="text-xs text-gray-500 leading-relaxed mb-2">${item.desc}</p>
                        <span class="inline-block font-bold text-brand-brown">${item.price} ج.م</span>
                    </div>
                    <button onclick="sendWhatsApp('${item.name}', '${item.price}')" class="whatsapp-btn">
                        <span>اطلب الآن</span>
                        <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
                    </button>
                `;
                list.appendChild(el);
            });
            goToPage('items-page');
        }
    </script>
</body>
</html>

```
